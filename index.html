];

const audioCtx = typeof window !== 'undefined' ? new (window.AudioContext || window.webkitAudioContext)() : null;

function playTone(freq, dur, type='sine', vol=0.12) {
  if (!audioCtx) return;
  audioCtx.resume();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playSuccess() {
  playTone(523,0.12); setTimeout(()=>playTone(659,0.12),80);
  setTimeout(()=>playTone(784,0.12),160); setTimeout(()=>playTone(1047,0.25),240);
}
function playClick() { playTone(700,0.06,'sine',0.08); }
function playWrong() { playTone(300,0.18,'square',0.08); setTimeout(()=>playTone(250,0.25,'square',0.08),120); }
function playDing() { playTone(1100,0.12,'sine',0.1); setTimeout(()=>playTone(1400,0.15,'sine',0.08),80); }

function speakKorean(text) {
  if (typeof window === 'undefined' || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.9;
  u.pitch = 1.3;
  u.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang === 'ko-KR' && v.name.includes('Google'))
    || voices.find(v => v.lang === 'ko-KR')
    || voices.find(v => v.lang.startsWith('ko'));
  if (koVoice) u.voice = koVoice;
  window.speechSynthesis.speak(u);
}

function speakEnglish(text) {
  if (typeof window === 'undefined' || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.8;
  u.pitch = 1.2;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) u.voice = enVoice;
  window.speechSynthesis.speak(u);
}

              background:`linear-gradient(135deg, ${getColor(selectedEl)}, ${getColor(selectedEl)}dd)`,
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              margin:'0 auto 18px', boxShadow:`0 8px 24px ${getColor(selectedEl)}44`,
              animation:'popIn 0.4s ease', border:'3px solid rgba(255,255,255,0.5)',
            }}>
              <span style={{fontSize:14,fontWeight:600,opacity:0.6,color:'#2d2015'}}>{selectedEl.n}</span>
              <span style={{fontSize:52,fontWeight:900,lineHeight:1,color:'#2d2015'}}>{selectedEl.s}</span>
              <span style={{fontSize:17,fontWeight:800,fontFamily:'"Noto Sans KR"',color:'#2d2015'}}>{selectedEl.k}</span>
            </div>

            {/* English name */}
            <div style={{textAlign:'center',fontSize:22,fontWeight:700,color:'#5D4E37',marginBottom:6,
              fontFamily:'"Gaegu",cursive',letterSpacing:'-0.3px'}}>
              {selectedEl.e}
            </div>

            {/* Category badge */}
            <div style={{textAlign:'center',marginBottom:14}}>
              <span style={{
                background:getColor(selectedEl)+'33',borderRadius:12,padding:'4px 14px',
                fontSize:12,fontWeight:700,color:'#5D4E37',fontFamily:'"Noto Sans KR"',
                border:`1.5px solid ${getColor(selectedEl)}`,
              }}>{CAT_SHORT[selectedEl.cat]}</span>
            </div>

            {/* Emoji */}
            <div style={{textAlign:'center',fontSize:56,margin:'8px 0',animation:'float 2s ease infinite'}}>
              {selectedEl.em}
            </div>

            {/* Description */}
            <div style={{
              background:'#FAF6EF',borderRadius:18,padding:'16px 18px',
              fontSize:15,lineHeight:1.9,color:'#4A3F32',
              fontFamily:'"Noto Sans KR"',fontWeight:500,
              marginBottom:18,border:'1px solid #EDE5D8',
            }}>
              {selectedEl.d}
            </div>

            {/* Voice buttons */}
            <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
              <button className="btn-nav" onClick={()=>{playClick();speakEnglish(selectedEl.e);}} style={{
                flex:1, background:'#5D4E37',color:'#F5F0E8',border:'none',borderRadius:14,
                padding:'11px 10px',fontSize:13,fontWeight:700,cursor:'pointer',
                fontFamily:'"Noto Sans KR"',minWidth:130,
              }}>🔊 영어 발음 듣기</button>
              <button className="btn-nav" onClick={()=>{playClick();speakKorean(selectedEl.k);}} style={{
                flex:1, background:'#8B7355',color:'#F5F0E8',border:'none',borderRadius:14,
                padding:'11px 10px',fontSize:13,fontWeight:700,cursor:'pointer',
                fontFamily:'"Noto Sans KR"',minWidth:130,
              }}>🔊 한국어 발음 듣기</button>
            </div>
            <button className="btn-nav" onClick={()=>{playClick();speakKorean(selectedEl.d);}} style={{
              width:'100%',background:'#A89478',color:'white',border:'none',borderRadius:14,
              padding:'11px',fontSize:13,fontWeight:700,cursor:'pointer',
              fontFamily:'"Noto Sans KR"',marginBottom:16,
            }}>🔊 설명 들어보기</button>

            {/* Prev / Learned / Next */}
            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
              <button className="btn-nav" onClick={()=>goNav(-1)} style={{
                background:'#EDE5D8',border:'1.5px solid #D8CEBD',borderRadius:14,
                padding:'10px 18px',fontSize:14,fontWeight:700,cursor:'pointer',
                fontFamily:'"Noto Sans KR"',color:'#5D4E37',
              }}>⬅ 이전</button>
              <button className="btn-nav" onClick={markLearned} style={{
                background:learned.has(selectedEl.n)?'#A5D6A7':'linear-gradient(135deg,#F0C060,#E0A030)',
                border:'none',borderRadius:14,padding:'10px 22px',fontSize:14,fontWeight:800,
                cursor:'pointer',fontFamily:'"Noto Sans KR"',color:learned.has(selectedEl.n)?'#2E7D32':'#5D4E37',
                animation:learned.has(selectedEl.n)?'none':'float 2s ease infinite',
              }}>{learned.has(selectedEl.n)?'✅ 학습 완료!':'⭐ 배웠어요!'}</button>
              <button className="btn-nav" onClick={()=>goNav(1)} style={{
                background:'#EDE5D8',border:'1.5px solid #D8CEBD',borderRadius:14,
                padding:'10px 18px',fontSize:14,fontWeight:700,cursor:'pointer',
                fontFamily:'"Noto Sans KR"',color:'#5D4E37',
              }}>다음 ➡</button>
            </div>
          </div>
        </div>
      )}

      {/* ===== QUIZ VIEW ===== */}
      {view==='quiz' && quizEl && (
        <div style={{maxWidth:500,margin:'0 auto',padding:'0 16px',animation:'fadeUp 0.4s ease',position:'relative',zIndex:1}}>
          <button className="btn-nav" onClick={()=>{playClick();setView('table');}} style={{
            display:'flex', alignItems:'center', gap:8,
            background:'#5D4E37', color:'#F5F0E8',
            border:'none', borderRadius:16, padding:'10px 20px',
            fontSize:14, fontWeight:700, cursor:'pointer', marginBottom:12,
            fontFamily:'"Noto Sans KR"', boxShadow:'0 3px 10px rgba(93,78,55,0.2)',
          }}>
            <span style={{fontSize:18}}>←</span> 주기율표로 돌아가기
          </button>

          <div style={{
            background:'white',borderRadius:24,padding:28,
            boxShadow:'0 8px 32px rgba(93,78,55,0.1)',
            border:'1px solid #E8DFD0',textAlign:'center',
          }}>
            <div style={{fontSize:32,marginBottom:4}}>🎮</div>
            <h2 style={{fontFamily:'"Gaegu",cursive',fontSize:24,color:'#5D4E37',margin:'0 0 16px'}}>
              원소 퀴즈!
            </h2>

            <div style={{
              background:'#FAF6EF',borderRadius:18,padding:'18px 16px',marginBottom:20,
              border:'1px solid #EDE5D8',
            }}>
              <div style={{fontSize:42,marginBottom:8}}>{quizEl.em}</div>
              <p style={{fontSize:15,lineHeight:1.8,color:'#4A3F32',fontFamily:'"Noto Sans KR"',
                fontWeight:500,margin:0,textAlign:'left'}}>
                💡 <strong>힌트:</strong> {quizEl.d}
              </p>
            </div>

            <p style={{fontSize:16,fontWeight:700,fontFamily:'"Noto Sans KR"',color:'#8B7355',margin:'0 0 14px'}}>
              이 원소는 무엇일까요?
            </p>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {quizOpts.map(opt=>{
                let bg = getColor(opt);
                let bdr = '2px solid rgba(255,255,255,0.4)';
                if(quizResult){
                  if(opt.n===quizEl.n){ bg='#A5D6A7'; bdr='2px solid #4CAF50'; }
                  else bg='#EDE5D8';
                }
                return (
                  <button key={opt.n} className="quiz-opt" onClick={()=>answerQuiz(opt)} style={{
                    background:bg,border:bdr,borderRadius:18,padding:'18px 12px',
                    cursor:quizResult?'default':'pointer',display:'flex',flexDirection:'column',
                    alignItems:'center',gap:4,
                  }}>
                    <span style={{fontSize:30,fontWeight:800,color:'#2d2015'}}>{opt.s}</span>
                    <span style={{fontSize:14,fontWeight:700,fontFamily:'"Noto Sans KR"',color:'#3d3025'}}>{opt.k}</span>
                  </button>
                );
              })}
            </div>

            {quizResult==='correct' && (
              <div style={{
                background:'linear-gradient(135deg,#A5D6A7,#81C784)',
                borderRadius:18,padding:16,color:'#1B5E20',
                fontSize:17,fontWeight:800,fontFamily:'"Noto Sans KR"',
                animation:'popIn 0.4s ease',marginBottom:12,
              }}>🎉 정답이에요! {praise}</div>
            )}
            {quizResult==='wrong' && (
              <div style={{
                background:'linear-gradient(135deg,#FFCDD2,#EF9A9A)',
                borderRadius:18,padding:16,color:'#B71C1C',
                fontSize:15,fontWeight:700,fontFamily:'"Noto Sans KR"',
                animation:'popIn 0.4s ease',marginBottom:12,
              }}>😊 아쉬워요! 정답은 <strong>{quizEl.s} ({quizEl.k})</strong>이에요!</div>
            )}

            {quizResult && (
              <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:8}}>
                <button className="btn-nav" onClick={startQuiz} style={{
                  background:'#5D4E37',color:'#F5F0E8',border:'none',borderRadius:16,
                  padding:'10px 24px',fontSize:14,fontWeight:700,cursor:'pointer',
                  fontFamily:'"Noto Sans KR"',
                }}>🎮 다음 퀴즈!</button>
              </div>
            )}

            <button className="btn-nav" onClick={()=>{playClick();speakKorean(quizEl.d);}} style={{
              background:'#A89478',color:'white',border:'none',borderRadius:14,
              padding:'9px 20px',fontSize:13,fontWeight:700,cursor:'pointer',
              fontFamily:'"Noto Sans KR"',marginTop:4,
            }}>🔊 힌트 다시 듣기</button>
          </div>
        </div>
      )}

      {/* Progress bar */}
      <div style={{
        maxWidth:500,margin:'16px auto 20px',padding:'0 16px',
        position:'relative',zIndex:1,
      }}>
        <div style={{
          background:'#EDE5D8',borderRadius:14,padding:'10px 14px',
          border:'1px solid #D8CEBD',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:12,fontWeight:700,color:'#8B7355',fontFamily:'"Noto Sans KR"',whiteSpace:'nowrap'}}>
              학습 진행
            </span>
            <div style={{flex:1,height:14,background:'#DDD5C6',borderRadius:7,overflow:'hidden'}}>
              <div style={{
                width:`${(learned.size/118)*100}%`,height:'100%',
                background:'linear-gradient(90deg,#D4A843,#A5D6A7)',
                borderRadius:7,transition:'width 0.5s ease',
              }}/>
            </div>
            <span style={{fontSize:12,fontWeight:800,color:'#5D4E37'}}>
              {Math.round((learned.size/118)*100)}%
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(PeriodicTableGame));
</script>
</body>
</html>
